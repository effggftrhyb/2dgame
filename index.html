<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Adventure Quest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #ffd700;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
            display: flex;
            gap: 20px;
        }
        #ui div {
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 4px;
            border: 2px solid #ffd700;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
            text-align: center;
        }
        #overlay h1 {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 30px;
            text-shadow: 3px 3px 0 #ff0000;
        }
        #overlay p {
            font-size: 12px;
            margin: 10px 0;
            color: #87ceeb;
        }
        #overlay .start-btn {
            margin-top: 40px;
            padding: 15px 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            background: #ffd700;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 0 #b8860b;
        }
        #overlay .start-btn:hover { background: #ffec8b; }
        #overlay .start-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #message {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 10px;
            text-shadow: 1px 1px 0 #000;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 4px;
            display: none;
            z-index: 10;
        }
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            gap: 10px;
            z-index: 10;
        }
        
        body.mobile #mobileControls {
            display: flex !important;
        }
        .controlBtn {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 2px solid #ffd700;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .controlBtn:active {
            background: rgba(255,215,0,0.3);
            transform: scale(0.95);
        }
        @media (max-width: 768px), (pointer: coarse) {
            #gameContainer {
                max-width: 100vw;
                max-height: 100vh;
                border: none;
                border-radius: 0;
            }
            canvas {
                width: 100vw;
                height: 65vh;
                max-height: 65vh;
                touch-action: none;
            }
            #ui {
                font-size: 8px;
                gap: 8px;
                flex-wrap: wrap;
            }
            #ui div {
                padding: 4px 6px;
            }
            #mobileControls {
                display: flex;
                bottom: 10px;
                left: 10px;
                right: 10px;
                justify-content: space-between;
            }
            .controlBtn {
                width: 60px;
                height: 60px;
                font-size: 24px;
                background: rgba(0,0,0,0.7);
            }
            #message {
                font-size: 8px;
                bottom: 80px;
            }
            #overlay p {
                font-size: 8px;
            }
            #overlay .start-btn {
                padding: 12px 30px;
                font-size: 12px;
            }
            #overlay h1 {
                font-size: 20px;
            }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            canvas {
                height: 75vh;
                max-height: 75vh;
            }
            .controlBtn {
                width: 50px;
                height: 50px;
            }
        }
    </style>

let imagesLoaded = 0;

function loadImage(src) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { imagesLoaded++; resolve(img); };
        img.onerror = () => { imagesLoaded++; resolve(null); };
        img.src = src;
    });
}

async function isTouchDevice() {
    return 'ontouchstart' in window || navigator.maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches;
}

function preloadAssets() {
    if (isTouchDevice()) {
        document.getElementById('mobileControls').style.display = 'flex';
    }
    
    const loadPromises = [];

    for (let i = 0; i <= 7; i++) {
        loadPromises.push(loadImage(`assets/Interactive/coin_gold_${i}.png`).then(img => {
            if (img) coinImages[i] = img;
        }));
    }

    loadPromises.push(loadImage('assets/Player/player_idle_0.png').then(img => { if (img) playerImages.idle[0] = img; }));
    loadPromises.push(loadImage('assets/Player/player_idle_1.png').then(img => { if (img) playerImages.idle[1] = img; }));

    loadPromises.push(loadImage('6level.jpg').then(img => { if (img) bgImages[6] = img; }));
    loadPromises.push(loadImage('7level.jpg').then(img => { if (img) bgImages[7] = img; }));

    await Promise.all(loadPromises);
    setupMobileControls();

function generateGroundTiles(maxX) {
    const tiles = [];
    for (let x = 0; x < maxX; x += 40) {
        const isLeft = x % 280 === 0;
        const isRight = (x + 40) % 280 === 0;
        let type = 'stone_mid';
        if (isLeft) type = 'stone_left';
        else if (isRight) type = 'stone_right';
        
        tiles.push({ x, type });
        if (isRight || (x > 0 && x % 280 === 160)) {
            tiles.push({ x: x + 40, type: 'stone_fill' });
        }
    }
    return tiles;
}

function generatePlatforms(maxX, vertical = false) {
    const platforms = [];
    for (let x = 200; x < maxX - 200; x += vertical ? 250 : 350) {
        platforms.push({ 
            x, 
            y: vertical ? 150 + Math.random() * 200 : 280 + Math.random() * 100, 
            w: 80 + Math.random() * 40, 
            h: 20 
        });
    }
    return platforms;
}

function generateEnemies(maxX) {
    const enemies = [];
    const types = ['crab', 'plant', 'ghost'];
    for (let x = 300; x < maxX - 300; x += 400) {
        enemies.push({ x, y: 388, type: types[Math.floor(Math.random() * 3)] });
    }
    return enemies;
}

function generateCoins(maxX) {
    const coins = [];
    for (let x = 250; x < maxX - 250; x += 300) {
        coins.push({ x, y: 250 + Math.random() * 100 });
    }
    return coins;
}

// ==================== PLAYER ====================
const player = {
    x: 50, y: 300, vx: 0, vy: 0,
    width: PLAYER_WIDTH, height: PLAYER_HEIGHT,
    onGround: false, facing: 1,
    invincible: 0, animFrame: 0, state: 'idle'
};

let currentLevel = null;
let enemies = [];
let coins = [];
let cameraX = 0;
let platforms = [];
let artifact = null;
let hasArtifact = false;
let npc = null;
let artifacts = [];
let npcs = [];
let collectedArtifacts = [];

keyEPressed = false;

// Mobile controls
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const jumpBtn = document.getElementById('jumpBtn');
const interactBtn = document.getElementById('interactBtn');

function setupMobileControls() {
    const handleTouch = (elem, keyMap) => {
        elem.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            for (const k of keyMap) keys[k] = true;
        }, { passive: false });
        elem.addEventListener('touchend', (e) => {
            e.preventDefault();
            e.stopPropagation();
            for (const k of keyMap) keys[k] = false;
        }, { passive: false });
        elem.addEventListener('touchcancel', (e) => {
            for (const k of keyMap) keys[k] = false;
        }, { passive: false });
    };
    handleTouch(leftBtn, ['ArrowLeft', 'a', 'A']);
    handleTouch(rightBtn, ['ArrowRight', 'd', 'D']);
    handleTouch(jumpBtn, [' ', 'w', 'W', 'ArrowUp']);

    interactBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        keyEPressed = true;
    }, { passive: false });
    interactBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        keyEPressed = false;
    }, { passive: false });

    canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
}

document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

function loadLevel(levelNum) {
    currentLevel = levels[levelNum];
    
    if (!currentLevel || levelNum > 20) {
        gameComplete();
        return;
    }
    
    player.x = currentLevel.startX;
    player.y = currentLevel.startY;
    player.vx = 0;
    player.vy = 0;
    player.onGround = true;
    player.invincible = 120;
    
    // Reset and setup enemies
    enemies = currentLevel.enemies.map(e => ({
        ...e,
        originX: e.x,
        originY: e.y,
        patrolRange: 80,
        vx: e.type === 'ghost' ? 0 : (Math.random() > 0.5 ? 2 : -2),
        width: 32,
        height: 32,
        animFrame: Math.random() * Math.PI * 2,
        active: true
    }));
    
    // Reset and setup coins
    coins = currentLevel.coins.map(c => ({
        ...c,
        width: 24,
        height: 24,
        animFrame: Math.random() * Math.PI * 2,
        collected: false
    }));
    
    // Setup platforms
    platforms = currentLevel.platforms || [];
    
    // Setup artifact (single artifact for levels 1-6)
    if (currentLevel.artifact) {
        artifact = {
            ...currentLevel.artifact,
            width: 32,
            height: 32,
            animFrame: 0
        };
        hasArtifact = false;
    } else {
        artifact = null;
    }
    
    // Setup NPC (single NPC for levels 1-6)
    if (currentLevel.npc) {
        npc = {
            ...currentLevel.npc,
            hasQuest: true
        };
    } else {
        npc = null;
    }
    
    // Setup multiple artifacts and NPCs for level 7
    if (levelNum === 7) {
        if (currentLevel.artifacts) {
            artifacts = currentLevel.artifacts.map(a => ({
                ...a,
                width: 32,
                height: 32,
                animFrame: Math.random() * Math.PI * 2,
                collected: false
            }));
        }
        if (currentLevel.npcs) {
            npcs = currentLevel.npcs.map(n => ({
                ...n,
                hasQuest: true
            }));
        }
    } else {
        artifacts = [];
        npcs = [];
        collectedArtifacts = [];
    }
    
    keyEPressed = false;
    cameraX = 0;
    updateUI();
}

function updateUI() {
    document.getElementById('levelDisplay').textContent = gameState.level;
    document.getElementById('coinsDisplay').textContent = gameState.coins;
    document.getElementById('scoreDisplay').textContent = gameState.score;
    document.getElementById('livesDisplay').textContent = gameState.lives;
    if (currentLevel && currentLevel.name) {
        document.getElementById('levelName').textContent = currentLevel.name;
        document.getElementById('levelName').style.cssText = 'color:#ffd700;font-size:10px;background:rgba(0,0,0,0.6);padding:4px 8px;border-radius:4px;border:2px solid #ffd700;';
    }
}

// ==================== UPDATE ====================
function update() {
    if (!gameRunning || !currentLevel) return;

    const groundY = currentLevel.groundY;

    // --- Player movement ---
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        player.vx = -SPEED;
        player.facing = -1;
        if (player.onGround) player.state = 'walk';
    } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        player.vx = SPEED;
        player.facing = 1;
        if (player.onGround) player.state = 'walk';
    } else {
        player.vx = 0;
        if (player.onGround) player.state = 'idle';
    }

    if (!player.onGround) player.state = 'jump';

    if ((keys[' '] || keys['w'] || keys['W'] || keys['ArrowUp']) && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
        player.state = 'jump';
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    if (player.x < 0) player.x = 0;

    let onPlatform = false;
    player.y += player.vy;

    // Platform collision
    for (const plat of platforms) {
        if (player.x + player.width > plat.x && player.x < plat.x + plat.w &&
            player.y + player.height >= plat.y && player.y + player.height <= plat.y + plat.h + player.vy) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.onGround = true;
            onPlatform = true;
            break;
        }
    }

    if (!onPlatform && player.y + player.height >= groundY) {
        player.y = groundY - player.height;
        player.vy = 0;
        player.onGround = true;
    }

    if (player.y > canvas.height + 50) {
        playerDeath();
    }

    // --- Exit check ---
    const distToExit = Math.hypot(player.x - currentLevel.exitX, player.y - currentLevel.exitY);
    if (distToExit < 50) {
        const hasActiveQuest = (npc && npc.hasQuest) || npcs.some(n => n.hasQuest);
        if (hasActiveQuest) {
            showMessage('Сначала выполни задания всех NPC!');
        } else {
            gameState.score += 100;
            loadLevel(gameState.level + 1);
            return;
        }
    }

    player.animFrame += 0.1;

    // --- Enemy update & collision ---
    for (const enemy of enemies) {
        // Move enemy (patrol back and forth)
        if (enemy.type !== 'ghost') {
            enemy.x += enemy.vx;
            // Patrol within range from origin
            if (enemy.x < enemy.originX - enemy.patrolRange) {
                enemy.x = enemy.originX - enemy.patrolRange;
                enemy.vx = Math.abs(enemy.vx);
            }
            if (enemy.x > enemy.originX + enemy.patrolRange) {
                enemy.x = enemy.originX + enemy.patrolRange;
                enemy.vx = -Math.abs(enemy.vx);
            }
        } else {
            // Ghost floats up and down slightly
            enemy.x = enemy.originX + Math.sin(enemy.animFrame * 2) * 30;
        }

        enemy.animFrame += 0.05;

        // Collision with player
        if (enemy.active && player.invincible <= 0 &&
            player.x < enemy.x + enemy.width &&
            player.x + player.width > enemy.x &&
            player.y < enemy.y + enemy.height &&
            player.y + player.height > enemy.y) {

            if (player.vy > 0 && player.y + player.height < enemy.y + enemy.height / 2 + 10) {
                // Player jumps on enemy - destroy it!
                enemy.active = false;
                player.vy = -10;
                gameState.score += 50;
            } else {
                playerDeath();
            }
        }
    }

    // --- Coin collection ---
    for (const coin of coins) {
        if (coin.collected) continue;
        coin.animFrame += 0.1;

        if (player.x < coin.x + coin.width &&
            player.x + player.width > coin.x &&
            player.y < coin.y + coin.height &&
            player.y + player.height > coin.y) {
            coin.collected = true;
            gameState.coins++;
            gameState.score += 10;
        }
    }

    // --- Artifact collection (auto-pickup when touching) ---
    if (artifact && !artifact.collected) {
        artifact.animFrame += 0.08;

        const artW = artifact.width || 32;
        const artH = artifact.height || 32;
        if (player.x < artifact.x + artW &&
            player.x + player.width > artifact.x &&
            player.y < artifact.y + artH &&
            player.y + player.height > artifact.y) {
            artifact.collected = true;
            hasArtifact = true;
            gameState.score += 100;
            showMessage('Артефакт найден! Вернитесь к: ' + npc.name);
        }
    }

    // --- Multi-artifact collection (level 7) ---
    for (const art of artifacts) {
        if (art.collected) continue;
        art.animFrame += 0.08;

        if (player.x < art.x + art.width &&
            player.x + player.width > art.x &&
            player.y < art.y + art.height &&
            player.y + player.height > art.y) {
            art.collected = true;
            collectedArtifacts.push(art.requiredNpc);
            gameState.score += 100;
            showMessage('Артефакт найден! Принеси его нуждающемуся!');
        }
    }

    // --- NPC interaction ---
    if (npc) {
        const distToNPC = Math.abs(player.x - npc.x);
        if (distToNPC < 60 && keyEPressed) {
            if (npc.hasQuest) {
                if (hasArtifact) {
                    npc.hasQuest = false;
                    hasArtifact = false;
                    gameState.score += 200;
                    showMessage('Благодарю тебя, герой! Теперь путь свободен!');
                } else {
                    showMessage(npc.dialog);
                }
            }
            keyEPressed = false;
        }
    }

    // --- Multi-NPC interaction (level 7) ---
    for (const npcData of npcs) {
        const distToNPC = Math.abs(player.x - npcData.x);
        if (distToNPC < 60 && keyEPressed) {
            if (npcData.hasQuest) {
                const hasRequiredArtifact = collectedArtifacts.includes(npcData.requiredNpc);
                if (hasRequiredArtifact) {
                    npcData.hasQuest = false;
                    collectedArtifacts = collectedArtifacts.filter(a => a !== npcData.requiredNpc);
                    gameState.score += 200;
                    showMessage('Благодарю тебя, герой! Святилище будет помнить о тебе!');
                } else {
                    showMessage(npcData.dialog);
                }
            }
            keyEPressed = false;
        }
    }

    if (player.invincible > 0) player.invincible--;

    let maxCameraX = 2500 - canvas.width;
    if (gameState.level === 7) maxCameraX = 5200 - canvas.width;
    if (gameState.level >= 8 && gameState.level <= 10) maxCameraX = (2400 + (gameState.level - 8) * 100) - canvas.width;
    if (gameState.level >= 11 && gameState.level <= 20) maxCameraX = (1800 + (gameState.level - 11) * 200) - canvas.width;
    cameraX = Math.max(0, Math.min(maxCameraX, player.x - canvas.width / 3));

    updateUI();
}

// ==================== PLAYER DEATH ====================
function playerDeath() {
    gameState.lives--;
    if (gameState.lives <= 0) {
        gameOver();
    } else {
        player.x = currentLevel.startX;
        player.y = currentLevel.groundY - player.height;
        player.vx = 0; player.vy = 0;
        player.onGround = true;
        player.invincible = 120;
    }
    updateUI();
}

function gameOver() {
    gameRunning = false;
    const overlay = document.getElementById('overlay');
    overlay.innerHTML = `
        <h1>GAME OVER</h1>
        <p>Ваш счёт: ${gameState.score}</p>
        <p>Монеты: ${gameState.coins}</p>
        <button class="start-btn" onclick="startGame()">ЕЩЁ РАЗ</button>
    `;
    overlay.style.display = 'flex';
}

function gameComplete() {
    gameRunning = false;
    const overlay = document.getElementById('overlay');
    overlay.innerHTML = `
        <h1>ПОБЕДА!</h1>
        <p>Вы прошли все 20 уровней!</p>
        <p>Счёт: ${gameState.score}</p>
        <p>Монеты: ${gameState.coins}</p>
        <button class="start-btn" onclick="startGame()">ИГРАТЬ СНОВА</button>
    `;
    overlay.style.display = 'flex';
}

// ==================== RENDER ====================
function render() {
    if (!currentLevel) return;

    const bg = bgImages[currentLevel.bg];
    if (bg) {
        ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    } else {
        const bgNum = currentLevel.bg || 1;
        ctx.fillStyle = '#87CEEB';
        if (bgNum === 2) ctx.fillStyle = '#1a0a00';
        if (bgNum === 3) ctx.fillStyle = '#2a1a4a';
        if (bgNum === 4) ctx.fillStyle = '#2a1a1a';
        if (bgNum === 5) ctx.fillStyle = '#2F4F4F';
        if (bgNum === 6) ctx.fillStyle = '#B0E0E6';
        if (bgNum >= 7) ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Platforms
    for (const plat of platforms) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
        ctx.fillStyle = '#228B22';
        ctx.fillRect(plat.x, plat.y, plat.w, 6);
    }

    const groundY = currentLevel.groundY;

    // Ground tiles
    for (const tile of currentLevel.groundTiles) {
        const baseColor = currentLevel.bg === 1 ? '#228B22' :
                         currentLevel.bg === 2 ? '#4a4a4a' :
                         currentLevel.bg === 3 ? '#6a6a7a' : '#8B0000';
        const dirtColor = currentLevel.bg === 1 ? '#8B4513' :
                         currentLevel.bg === 2 ? '#2a2a2a' :
                         currentLevel.bg === 3 ? '#3a3a4a' : '#4a0000';

        if (tile.type.includes('left') || tile.type.includes('right') || tile.type.includes('mid')) {
            ctx.fillStyle = baseColor;
            ctx.fillRect(tile.x, groundY - 8, 40, 8);
            ctx.fillStyle = dirtColor;
            ctx.fillRect(tile.x, groundY, 40, 80);
        } else if (tile.type === 'dirt') {
            ctx.fillStyle = dirtColor;
            ctx.fillRect(tile.x, groundY, 40, 80);
        } else if (tile.type === 'cave_fill') {
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(tile.x, groundY, 40, 80);
        } else if (tile.type === 'stone_fill') {
            ctx.fillStyle = '#5a5a6a';
            ctx.fillRect(tile.x, groundY, 40, 80);
        } else if (tile.type === 'lava_fill') {
            ctx.fillStyle = '#6a2a2a';
            ctx.fillRect(tile.x, groundY, 40, 80);
        }
    }

    // Coins
    for (const coin of coins) {
        if (coin.collected) continue;
        const frame = Math.floor(coin.animFrame) % coinImages.length;
        const img = coinImages[frame];
        if (img) {
            ctx.drawImage(img, coin.x, coin.y, coin.width, coin.height);
        } else {
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(coin.x + 12, coin.y + 12, 10, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Artifact (star)
    if (artifact && !artifact.collected) {
        const frame = Math.floor(artifact.animFrame) % 10;
        const starImg = starImages[frame];
        if (starImg) {
            ctx.drawImage(starImg, artifact.x - 8, artifact.y - 8, 48, 48);
        } else {
            ctx.fillStyle = '#FFD700';
            ctx.font = '32px Arial';
            ctx.fillText('★', artifact.x, artifact.y + 28);
        }
        // Glow effect
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(artifact.x + 16, artifact.y + 16, 24 + Math.sin(artifact.animFrame * 3) * 4, 0, Math.PI * 2);
        ctx.fill();
    }

    // NPC rendering
    if (npc) {
        const npcColors = {
            'Хранитель Леса': { body: '#2E8B57', robe: '#1E5631', accent: '#FFD700', skin: '#DEB887' },
            'Старый Шахтёр': { body: '#8B4513', robe: '#5D3A1A', accent: '#C0C0C0', skin: '#DEB887' },
            'Фермер Иван': { body: '#8B4513', robe: '#D2691E', accent: '#FFD700', skin: '#DEB887' },
            'Старший Смотритель': { body: '#696969', robe: '#2F4F4F', accent: '#C0C0C0', skin: '#DEB887' },
            'Старый Капитан': { body: '#8B4513', robe: '#5D3A1A', accent: '#FFD700', skin: '#DEB887' },
            'Ледяная Ведьма': { body: '#4169E1', robe: '#1E3A8A', accent: '#87CEEB', skin: '#E0FFFF' }
        };
        const colors = npcColors[npc.name] || { body: '#666', robe: '#333', accent: '#fff', skin: '#DEB887' };

        ctx.fillStyle = colors.robe;
        ctx.fillRect(npc.x + 2, npc.y + 20, 28, 20);
        ctx.fillStyle = colors.body;
        ctx.fillRect(npc.x + 6, npc.y + 10, 20, 14);
        ctx.fillStyle = colors.skin;
        ctx.beginPath();
        ctx.arc(npc.x + 16, npc.y + 6, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = colors.accent;
        ctx.beginPath();
        ctx.moveTo(npc.x + 16, npc.y - 8);
        ctx.lineTo(npc.x + 6, npc.y + 4);
        ctx.lineTo(npc.x + 26, npc.y + 4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(npc.x + 12, npc.y + 4, 3, 3);
        ctx.fillRect(npc.x + 19, npc.y + 4, 3, 3);
        ctx.fillStyle = colors.body;
        ctx.fillRect(npc.x, npc.y + 14, 6, 12);
        ctx.fillRect(npc.x + 26, npc.y + 14, 6, 12);

        const distToNPC = Math.abs(player.x - npc.x);
        if (distToNPC < 60) {
            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.fillText('[E]', npc.x + 6, npc.y - 16);

            if (npc.hasQuest && !hasArtifact) {
                ctx.fillStyle = '#FFD700';
                ctx.fillText('!', npc.x + 14, npc.y - 28);
            } else if (hasArtifact && npc.hasQuest) {
                ctx.fillStyle = '#00FF00';
                ctx.fillText('✓', npc.x + 12, npc.y - 28);
            }
        }
    }

    // Multi-NPC rendering (level 7)
    const npcNames7 = {
        'Архивариус Элдор': { body: '#8B4513', robe: '#5D3A1A', accent: '#DAA520', skin: '#DEB887' },
        'Хранительница Тайн': { body: '#4B0082', robe: '#2E0854', accent: '#9400D3', skin: '#FFE4E1' },
        'Мастер Мечей': { body: '#696969', robe: '#2F4F4F', accent: '#C0C0C0', skin: '#DEB887' },
        'Алхимик Зельевар': { body: '#2E8B57', robe: '#1E5631', accent: '#00FF7F', skin: '#DEB887' },
        'Повелитель Ветров': { body: '#87CEEB', robe: '#4682B4', accent: '#E0FFFF', skin: '#FFE4E1' },
        'Хранитель Огня': { body: '#FF4500', robe: '#8B0000', accent: '#FFA500', skin: '#DEB887' },
        'Страж Времени': { body: '#FFD700', robe: '#B8860B', accent: '#FF8C00', skin: '#DEB887' },
        'Владыка Теней': { body: '#2F2F2F', robe: '#1A1A1A', accent: '#8B008B', skin: '#E6E6FA' }
    };
    
    for (const npcData of npcs) {
        const colors7 = npcNames7[npcData.name] || { body: '#666', robe: '#333', accent: '#fff', skin: '#DEB887' };
        
        ctx.fillStyle = colors7.robe;
        ctx.fillRect(npcData.x + 2, npcData.y + 20, 28, 20);
        ctx.fillStyle = colors7.body;
        ctx.fillRect(npcData.x + 6, npcData.y + 10, 20, 14);
        ctx.fillStyle = colors7.skin;
        ctx.beginPath();
        ctx.arc(npcData.x + 16, npcData.y + 6, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = colors7.accent;
        ctx.beginPath();
        ctx.moveTo(npcData.x + 16, npcData.y - 8);
        ctx.lineTo(npcData.x + 6, npcData.y + 4);
        ctx.lineTo(npcData.x + 26, npcData.y + 4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(npcData.x + 12, npcData.y + 4, 3, 3);
        ctx.fillRect(npcData.x + 19, npcData.y + 4, 3, 3);
        ctx.fillStyle = colors7.body;
        ctx.fillRect(npcData.x, npcData.y + 14, 6, 12);
        ctx.fillRect(npcData.x + 26, npcData.y + 14, 6, 12);

        const distToNPC = Math.abs(player.x - npcData.x);
        if (distToNPC < 60) {
            ctx.fillStyle = '#fff';
            ctx.font = '10px monospace';
            ctx.fillText('[E]', npcData.x + 6, npcData.y - 16);

            const hasArtifactForThis = collectedArtifacts.includes(npcData.requiredNpc);
            if (npcData.hasQuest && !hasArtifactForThis) {
                ctx.fillStyle = '#FFD700';
                ctx.fillText('!', npcData.x + 14, npcData.y - 28);
            } else if (hasArtifactForThis && npcData.hasQuest) {
                ctx.fillStyle = '#00FF00';
                ctx.fillText('✓', npcData.x + 12, npcData.y - 28);
            }
        }
    }

    // Multi-artifact rendering (level 7)
    for (const art of artifacts) {
        if (art.collected) continue;
        const frame = Math.floor(art.animFrame) % 10;
        const starImg = starImages[frame];
        if (starImg) {
            ctx.drawImage(starImg, art.x - 8, art.y - 8, 48, 48);
        } else {
            ctx.fillStyle = '#FFD700';
            ctx.font = '32px Arial';
            ctx.fillText('★', art.x, art.y + 28);
        }
        ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(art.x + 16, art.y + 16, 24 + Math.sin(art.animFrame * 3) * 4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Enemies
    for (const enemy of enemies) {
        if (!enemy.active) continue;
        let img = null;
        const frame = Math.floor(enemy.animFrame) % 2;

        if (enemy.type === 'crab' && enemyImages.crab[frame]) {
            img = enemyImages.crab[frame];
        } else if (enemy.type === 'plant' && enemyImages.plant[frame]) {
            img = enemyImages.plant[frame];
        } else if (enemy.type === 'ghost' && enemyImages.ghost[frame]) {
            img = enemyImages.ghost[frame];
        }

        if (img) {
            ctx.save();
            if (enemy.vx < 0) {
                ctx.translate(enemy.x + enemy.width, enemy.y);
                ctx.scale(-1, 1);
                ctx.drawImage(img, 0, 0, enemy.width, enemy.height);
            } else {
                ctx.drawImage(img, enemy.x, enemy.y, enemy.width, enemy.height);
            }
            ctx.restore();
        } else {
            ctx.fillStyle = enemy.type === 'ghost' ? 'rgba(136,136,136,0.7)' :
                           (enemy.type === 'plant' ? '#228B22' : '#FF4500');
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(enemy.x + 8, enemy.y + 8, 4, 4);
            ctx.fillRect(enemy.x + 20, enemy.y + 8, 4, 4);
            ctx.fillStyle = '#000';
            ctx.fillRect(enemy.x + 9, enemy.y + 9, 2, 2);
            ctx.fillRect(enemy.x + 21, enemy.y + 9, 2, 2);
        }
    }

    // Exit portal
    const exitX = currentLevel.exitX;
    const exitY = groundY - 70;
    ctx.fillStyle = '#00FF00';
    ctx.beginPath();
    ctx.ellipse(exitX + 20, exitY + 20, 25, 35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.ellipse(exitX + 20, exitY + 20, 35, 45, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Player
    if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
        ctx.globalAlpha = 0.5;
    }

    let img = null;
    if (player.state === 'idle') {
        const frame = Math.floor(player.animFrame) % playerImages.idle.length;
        img = playerImages.idle[frame] || playerImages.idle[0];
    } else if (player.state === 'walk') {
        const frame = Math.floor(player.animFrame) % playerImages.walk.length;
        img = playerImages.walk[frame] || playerImages.walk[0];
    } else if (player.state === 'jump') {
        img = playerImages.jump;
    }

    if (img) {
        ctx.save();
        if (player.facing === -1) {
            ctx.translate(player.x + player.width, player.y);
            ctx.scale(-1, 1);
            ctx.drawImage(img, 0, 0, player.width, player.height);
        } else {
            ctx.drawImage(img, player.x, player.y, player.width, player.height);
        }
        ctx.restore();
    } else {
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
}

// ==================== GAME LOOP ====================
function gameLoop() {
    if (gameRunning) {
        update();
        render();
    }
    requestAnimationFrame(gameLoop);
}

async function startGame() {
    document.getElementById('overlay').style.display = 'none';

    if (Object.keys(playerImages.idle).length === 0 ||
        Object.keys(enemyImages.crab).length === 0 ||
        Object.keys(bgImages).length === 0) {
        await preloadAssets();
    }

    gameState = { level: 1, coins: 0, score: 0, lives: 3 };
    gameRunning = true;
    loadLevel(1);
}

// ==================== INPUT ====================
document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
    }
    if (e.key === 'e' || e.key === 'E') {
        keyEPressed = true;
    }
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
});

const msgEl = document.getElementById('message');
let msgTimeout;
function showMessage(text) {
    msgEl.textContent = text;
    msgEl.style.display = 'block';
    clearTimeout(msgTimeout);
    msgTimeout = setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
}

gameLoop();
    
    if (isTouchDevice()) {
        document.body.classList.add('mobile');
    }
    </script>
